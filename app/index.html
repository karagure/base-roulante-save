<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Base roulante — Télécommande &amp; Code bloc</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
</head>
<body>
  <header>
    <h1>Base roulante</h1>
    <a href="record.html" class="link-record">Enregistrement parcours →</a>
    <div class="conn">
      <button id="btn-connect">Connecter (BLE)</button>
      <span id="status" class="status off">Déconnecté</span>
    </div>
    <div id="telemetry" class="telemetry">—</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="remote">Télécommande</button>
    <button class="tab" data-tab="auto">Auto</button>
    <button class="tab" data-tab="blocks">Code bloc</button>
  </nav>

  <section id="tab-remote" class="tab-panel active">
    <div class="joystick-wrap">
      <div id="joystick-base" class="joystick-base">
        <div id="joystick-knob" class="joystick-knob"></div>
      </div>
    </div>
    <div class="speed-row">
      <label for="speed">Vitesse :</label>
      <input type="range" id="speed" min="0" max="255" value="200">
      <span id="speed-val">200</span>
    </div>
  </section>

  <section id="tab-auto" class="tab-panel">
    <div class="auto-panel">
      <button id="btn-auto-start">Mode déplacement autonome</button>
      <button id="btn-auto-stop" class="danger">Arrêt mode autonome</button>
      <p>État : <span id="auto-indicator" class="status off">Inactif</span></p>
      <div class="speed-row">
        <label for="auto-speed">Vitesse (mode auto) :</label>
        <input type="range" id="auto-speed" min="0" max="255" value="200">
        <span id="auto-speed-val">200</span>
      </div>
      <div class="speed-row">
        <label for="auto-threshold">Seuil obstacle (cm) :</label>
        <input type="range" id="auto-threshold" min="2" max="400" value="20">
        <span id="auto-threshold-val">20</span>
      </div>
    </div>
  </section>

  <section id="tab-blocks" class="tab-panel">
    <div id="blockly"></div>
    <div class="blocks-actions">
      <button id="btn-run">Exécuter ▶</button>
      <button id="btn-stop">STOP ■</button>
      <code id="preview"></code>
    </div>
  </section>

  <script src="js/ble.js"></script>
  <script src="js/app.js"></script>
  <script src="js/joystick.js"></script>
  <script src="js/remote.js"></script>
  <script src="js/auto.js"></script>
  <script src="js/blocks.js"></script>
</body>
</html>
